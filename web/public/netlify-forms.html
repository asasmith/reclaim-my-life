<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <form
      name="contact"
      method="POST"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      style="display: none"
    >
      <input type="hidden" name="form-name" value="contact" />
      <input
        id="bot-field"
        name="bot-field"
        type="text"
        tabindex="-1"
        autocomplete="off"
        style="display: none"
      />
      <input type="text" name="name" style="display: none" />
      <input type="email" name="email" style="display: none" />
      <input type="tel" name="phone" style="display: none" />
      <textarea name="message" style="display: none"></textarea>
    </form>

    <form
      name="registration"
      method="POST"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      style="display: none"
    >
      <input type="hidden" name="form-name" value="registration" />
      <input
        id="bot-field"
        name="bot-field"
        type="text"
        tabindex="-1"
        autocomplete="off"
        style="display: none"
      />
      <input type="text" name="name" style="display: none" />
      <input type="date" name="date-of-birth" style="display: none" />
      <input type="tel" name="phone-number" style="display: none" />
      <textarea name="drug-of-choice" style="display: none"></textarea>
      <input type="radio" name="drug-addict-alcoholic" value="Yes" style="display: none" />
      <input type="radio" name="drug-addict-alcoholic" value="No" style="display: none" />
      <input type="radio" name="sex-offender" value="Yes" style="display: none" />
      <input type="radio" name="sex-offender" value="No" style="display: none" />
      <textarea name="medications" style="display: none"></textarea>
      <textarea name="court-dates" style="display: none"></textarea>
      <input type="text" name="emergency-contact-name" style="display: none" />
      <input type="tel" name="emergency-contact-phone" style="display: none" />
      <input type="checkbox" name="twelve-step-agreement" value="yes" style="display: none" />
      <input type="date" name="todays-date" style="display: none" />
    </form>
  </body>
</html>
